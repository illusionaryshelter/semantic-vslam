# =============================================================================
# Semantic VSLAM 参数配置
# =============================================================================
# 使用方法:
#   ros2 launch semantic_vslam semantic_slam.launch.py \
#       engine_path:=$HOME/Desktop/ANTI/models/yolov8n-seg.engine
#
# 此文件由 launch.py 自动加载, 无需手动指定
# =============================================================================

# ---- 语义点云节点 (semantic_cloud_node) ----
semantic_cloud_node:
  ros__parameters:
    conf_thresh: 0.4          # YOLO 置信度阈值 (0.0-1.0)
    iou_thresh: 0.45          # NMS IoU 阈值
    depth_scale: 0.001        # 深度缩放 (Astra Pro: 0.001 = mm→m)
    enable_profiling: true    # 开启则打印 [perf] 性能日志

# ---- 语义地图累积节点 (semantic_map_node) ----
semantic_map_node:
  ros__parameters:
    # 地图参数
    target_frame: "map"       # 累积点云的目标坐标系
    voxel_size: 0.02          # 体素尺寸 (m), 越小越精细
    max_clouds: 150           # 滑动窗口帧数
    cloud_decimation: 3       # 输入点云抽稀倍率
    enable_profiling: true

    # 2D 栅格参数
    publish_rate: 1.0         # 地图发布频率 (Hz)
    grid_cell_size: 0.05      # 栅格分辨率 (m)
    grid_min_height: 0.1      # 障碍物最低高度 (m), 低于此视为地面
    grid_max_height: 2.0      # 障碍物最高高度 (m)

# ---- 物体级语义地图节点 (object_map_node) ----
object_map_node:
  ros__parameters:
    target_frame: "map"
    min_points: 50            # 物体最少 3D 点数 (过少则忽略)
    merge_distance: 0.5       # 同类物体合并距离 (m)
    max_objects: 50            # 最大跟踪物体数
    publish_rate: 2.0          # MarkerArray 发布频率 (Hz)
    enable_profiling: true
